{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI';
        }

        .signup-box {
            background: white;
            padding: 40px;
            width: 320px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
        }

        .signup-box h2 {
            margin-bottom: 20px;
        }

        .signup-box input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .signup-box button {
            width: 100%;
            padding: 10px;
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 6px;
            margin-top: 10px;
            cursor: pointer;
        }

        .signup-box button:hover {
            background: #16a34a;
        }

        .signup-box p {
            margin-top: 15px;
        }

        .signup-box a {
            color: #4f46e5;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="signup-box">
    <h2>Create Account</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Sign Up</button>
    </form>

    <p>Already have an account? <a href="/">Login</a></p>
</div>

</body>
</html>
