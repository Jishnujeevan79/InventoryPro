{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | InventoryPro</title>
<link rel="stylesheet" href="{% static 'css/style.css' %}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --primary-color: #4f46e5;
  --bg-light: #f4f4f8;
  --bg-dark: #1f1f1f;
  --text-light: #333;
  --text-dark: #fff;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: var(--bg-light);
  color: var(--text-light);
  transition: all 0.3s ease;
}

body.dark-mode { background: var(--bg-dark); color: var(--text-dark); }

.login-box {
  position: relative;
  background: #fff;
  padding: 40px 30px 50px 30px;
  width: 380px;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0px 15px 40px rgba(0,0,0,0.3);
}

body.dark-mode .login-box { background: #2c2c2c; }

.login-box h2 { margin-bottom: 15px; font-weight: 700; letter-spacing: 1px; }

.clock { font-size: 15px; margin-bottom: 25px; color: #666; }
body.dark-mode .clock { color: #ccc; }

.input-group { position: relative; margin: 15px 0; }
.input-group input {
  width: 100%;
  padding: 12px 40px 12px 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}
body.dark-mode .input-group input { background: #1f1f1f; color: #fff; border: 1px solid #555; }
.input-group i { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #aaa; }
body.dark-mode .input-group i { color: #ccc; }

.login-box button {
  width: 100%;
  padding: 14px;
  background: var(--primary-color);
  color: white;
  border: none;
  border-radius: 8px;
  margin-top: 20px;
  cursor: pointer;
  font-size: 16px;
  font-weight: 600;
}
.login-box button:hover { background: #4338ca; }

.login-box p { margin-top: 15px; font-size: 14px; }
.login-box a { color: var(--primary-color); text-decoration: none; font-weight: 500; }

.toggle-mode { position: absolute; top: 15px; right: 20px; cursor: pointer; font-size: 18px; color: var(--primary-color); }
.toggle-mode:hover { transform: scale(1.2); }

.modal { display: none; position: fixed; z-index: 999; left:0; top:0; width:100%; height:100%; background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
.modal-content { background-color: #fefefe; padding: 25px 20px; border-radius: 10px; width: 320px; text-align: center; font-size: 15px; }
body.dark-mode .modal-content { background-color: #333; color: #fff; }
.close-btn { margin-top: 15px; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; background: var(--primary-color); color: white; font-weight: 600; }
</style>
</head>
<body>

<div class="login-box">
  <span class="toggle-mode" onclick="toggleMode()"><i class="fa-solid fa-moon"></i></span>
  <h2>InventoryPro</h2>
  <div class="clock" id="clock">Hello!</div>

  <form method="POST">
    {% csrf_token %}
    <div class="input-group">
      <input type="text" name="username" placeholder="Username" autocomplete="username" required>
      <i class="fa-solid fa-user"></i>
    </div>
    <div class="input-group">
      <input type="password" name="password" placeholder="Password" autocomplete="current-password" required>
      <i class="fa-solid fa-lock"></i>
    </div>
    <button type="submit">Login</button>
  </form>

  <p>Don't have an account? <a href="/signup/">Sign Up</a></p>
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <p id="modal-message"></p>
    <button class="close-btn" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
document.getElementById('modal').style.display = 'none';

if (localStorage.getItem('darkMode') === '1') {
  document.body.classList.add('dark-mode');
  document.querySelector('.toggle-mode i').className = 'fa-solid fa-sun';
}

function updateClock() {
  const now = new Date();
  const hours = now.getHours();
  const mins = String(now.getMinutes()).padStart(2, '0');
  const secs = String(now.getSeconds()).padStart(2, '0');
  let greeting = 'Hello!';
  if (hours < 12) greeting = 'Good Morning!';
  else if (hours < 18) greeting = 'Good Afternoon!';
  else greeting = 'Good Evening!';
  document.getElementById('clock').innerText = `${greeting} | ${hours}:${mins}:${secs}`;
}
setInterval(updateClock, 1000);
updateClock();

function toggleMode() {
  document.body.classList.toggle('dark-mode');
  const isDark = document.body.classList.contains('dark-mode');
  localStorage.setItem('darkMode', isDark ? '1' : '0');
  document.querySelector('.toggle-mode i').className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

{% if messages %}
  const msgs = [{% for message in messages %}"{{ message|escapejs }}"{% if not forloop.last %},{% endif %}{% endfor %}];
  document.getElementById('modal-message').innerText = msgs.join('\n');
  document.getElementById('modal').style.display = 'flex';
{% endif %}
</script>

</body>
</html>
